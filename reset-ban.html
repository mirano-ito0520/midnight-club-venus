<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BAN Reset</title>
  <style>
    body { background: #0a0a1a; color: #d4af37; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; font-size: 18px; line-height: 2; }
  </style>
</head>
<body>
  <div class="msg" id="msg">解除中...</div>
  <script>
    try {
      localStorage.removeItem('mcv_banned');
      document.getElementById('msg').innerHTML = 'BAN解除完了！<br>このページを閉じてアプリを開き直してね';
    } catch {
      document.getElementById('msg').textContent = 'エラーが発生しました';
    }
  </script>
</body>
</html>
