<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script>
    // BAN緊急リセット — ?resetban でアクセスすると解除
    if (location.search.includes('resetban')) {
      localStorage.removeItem('mcv_banned');
      // Service Workerも解除して古いキャッシュを消す
      if (navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      caches.keys().then(function(names) {
        names.forEach(function(name) { caches.delete(name); });
      });
      // 1秒後にクリーンURLでリロード
      setTimeout(function() { location.replace(location.pathname); }, 1000);
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Midnight Club Venus</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <link rel="icon" type="image/png" href="assets/images/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nameEntry.css">
  <link rel="stylesheet" href="css/lobby.css">
  <link rel="stylesheet" href="css/dialogue.css">
  <link rel="stylesheet" href="css/jigsaw.css">
  <link rel="stylesheet" href="css/gallery.css">
  <link rel="stylesheet" href="css/secret.css">
  <link rel="stylesheet" href="css/runner.css">
</head>
<body>
  <div id="app">
    <!-- Global Mute Toggle -->
    <button id="mute-toggle" class="mute-btn" aria-label="Mute">🔊</button>

    <!-- Loading Screen -->
    <div id="scene-loading" class="scene active">
      <div class="loading-container">
        <img src="assets/images/ui/title-logo.png" alt="Midnight Club Venus" class="loading-logo">
        <div class="loading-bar">
          <div class="loading-bar-fill"></div>
        </div>
        <p class="loading-text">Loading...</p>
      </div>
    </div>

    <!-- Name Entry Scene -->
    <div id="scene-name-entry" class="scene">
      <div class="name-entry-bg" style="background-image: url('assets/images/backgrounds/name-entry.png')"></div>
      <div class="name-entry-character">
        <img src="assets/images/characters/venus/portrait.png" alt="VENUS">
      </div>
      <div class="dialogue-box name-entry-dialogue">
        <div class="dialogue-speaker">VENUS</div>
        <div class="dialogue-text" id="name-entry-text"></div>
        <div class="dialogue-advance-hint">Click to continue</div>
      </div>
      <div class="name-input-container" id="name-input-container" style="display:none;">
        <input type="text" id="player-name-input" class="name-input" placeholder="あなたの名前" maxlength="20" autocomplete="off">
        <button id="name-submit-btn" class="neon-btn">決定</button>
      </div>
    </div>

    <!-- Lobby Scene -->
    <div id="scene-lobby" class="scene">
      <div class="lobby-bg" style="background-image: url('assets/images/backgrounds/lobby.png')"></div>
      <div class="lobby-header">
        <img src="assets/images/ui/title-logo.png" alt="Midnight Club Venus" class="lobby-logo">
        <div class="lobby-actions">
          <button id="gallery-btn" class="neon-btn-sm">Gallery</button>
          <button id="settings-btn" class="neon-btn-sm">Settings</button>
        </div>
      </div>
      <div class="lobby-venus">
        <img src="assets/images/characters/venus/fullbody.png" alt="VENUS">
      </div>
      <div class="lobby-venus-speech" id="lobby-venus-speech"></div>
      <div class="lobby-cabinets" id="lobby-cabinets"></div>
    </div>

    <!-- Character Select Scene -->
    <div id="scene-char-select" class="scene">
      <div class="jigsaw-bg" style="background-image: url('assets/images/backgrounds/jigsaw-select.png')"></div>
      <h2 class="scene-title">Select Character</h2>
      <div class="char-select-grid" id="char-select-grid"></div>
      <button class="neon-btn back-btn" id="char-select-back">Back</button>
    </div>

    <!-- Difficulty Select Scene -->
    <div id="scene-diff-select" class="scene">
      <div class="jigsaw-bg" style="background-image: url('assets/images/backgrounds/jigsaw-select.png')"></div>
      <h2 class="scene-title" id="diff-select-title"></h2>
      <div class="diff-select-grid" id="diff-select-grid"></div>
      <button class="neon-btn back-btn" id="diff-select-back">Back</button>
    </div>

    <!-- Dialogue Scene -->
    <div id="scene-dialogue" class="scene">
      <div class="dialogue-bg" id="dialogue-bg"></div>
      <div class="dialogue-character" id="dialogue-character"></div>
      <button class="neon-btn-sm dialogue-skip-btn" id="dialogue-skip-btn">Skip</button>
      <div class="dialogue-box">
        <div class="dialogue-speaker" id="dialogue-speaker"></div>
        <div class="dialogue-text" id="dialogue-text"></div>
        <div class="dialogue-advance-hint">Click to continue</div>
      </div>
    </div>

    <!-- Jigsaw Play Scene -->
    <div id="scene-jigsaw" class="scene">
      <div class="jigsaw-bg" style="background-image: url('assets/images/backgrounds/jigsaw-select.png')"></div>
      <div class="jigsaw-hud">
        <button class="neon-btn-sm" id="jigsaw-back-btn">Exit</button>
        <div class="jigsaw-timer" id="jigsaw-timer">00:00</div>
        <div class="jigsaw-pieces" id="jigsaw-pieces">0 / 0</div>
        <button class="neon-btn-sm" id="jigsaw-hint-btn">Hint</button>
      </div>
      <div class="jigsaw-area" id="jigsaw-area">
        <canvas id="jigsaw-canvas"></canvas>
      </div>
    </div>

    <!-- Jigsaw Clear Scene -->
    <div id="scene-jigsaw-clear" class="scene">
      <div class="clear-overlay">
        <div class="clear-image" id="clear-image"></div>
        <div class="clear-info">
          <h2 class="clear-title">PUZZLE COMPLETE!</h2>
          <div class="clear-time" id="clear-time"></div>
          <div class="clear-notification">Gallery に追加しました！</div>
          <div class="clear-actions">
            <button class="neon-btn" id="clear-next-btn">Next</button>
            <button class="neon-btn" id="clear-lobby-btn">Lobby</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Runner Difficulty Select -->
    <div id="scene-runner-diff-select" class="scene">
      <div class="jigsaw-bg" style="background-image: url('assets/images/backgrounds/dialogue-club.png')"></div>
      <h2 class="scene-title" style="z-index:2;">NEON — Midnight Run</h2>
      <div class="runner-diff-grid" id="runner-diff-grid"></div>
      <button class="neon-btn back-btn" id="runner-diff-back" style="margin:12px auto;z-index:2;">Back</button>
    </div>

    <!-- Runner Game Scene -->
    <div id="scene-runner" class="scene">
      <div class="runner-area" id="runner-area">
        <canvas id="runner-canvas"></canvas>
      </div>
      <div class="runner-hud">
        <button class="neon-btn-sm" id="runner-exit">Exit</button>
        <div class="runner-score-display" id="runner-score">0</div>
        <div class="runner-target-display" id="runner-target">TARGET: 3000</div>
      </div>
    </div>

    <!-- Gallery Scene -->
    <div id="scene-gallery" class="scene">
      <div class="gallery-bg" style="background-image: url('assets/images/backgrounds/gallery.png')"></div>
      <div class="gallery-header">
        <h2 class="scene-title">Gallery</h2>
        <div class="gallery-filters" id="gallery-filters"></div>
        <div class="gallery-progress" id="gallery-progress"></div>
        <button class="neon-btn back-btn" id="gallery-back">Back</button>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <!-- Lightbox (shared across gallery & VIP) -->
    <div class="gallery-lightbox" id="gallery-lightbox" style="display:none;">
      <img id="gallery-lightbox-img" src="" alt="">
      <button class="lightbox-close" id="lightbox-close">&times;</button>
      <button class="lightbox-fav" id="lightbox-fav">&hearts;</button>
    </div>

    <!-- Banned Scene (Bodyguard) -->
    <div id="scene-banned" class="scene">
      <div class="banned-bg"></div>
      <div class="banned-container">
        <div class="banned-character" id="banned-character"></div>
        <div class="banned-text" id="banned-text"></div>
      </div>
    </div>

    <!-- Slot Machine Scene -->
    <div id="scene-slots" class="scene">
      <div class="secret-gallery-bg"></div>
      <div class="slots-container">
        <h2 class="scene-title secret-title">VENUS SLOTS</h2>
        <div class="slots-venus-msg" id="slots-venus-msg">「運命を試してみる？♡」</div>
        <div class="slots-reels" id="slots-reels">
          <div class="slots-reel" id="reel-0">?</div>
          <div class="slots-reel" id="reel-1">?</div>
          <div class="slots-reel" id="reel-2">?</div>
        </div>
        <button class="neon-btn" id="slots-spin-btn">SPIN</button>
        <div class="slots-count" id="slots-count"></div>
        <button class="neon-btn-sm" id="slots-back-btn" style="margin-top:16px;">Back</button>
      </div>
    </div>

    <!-- Quiz Scene -->
    <div id="scene-quiz" class="scene">
      <div class="secret-gallery-bg"></div>
      <div class="quiz-container">
        <h2 class="scene-title" id="quiz-title">QUIZ</h2>
        <div class="quiz-progress" id="quiz-progress"></div>
        <div class="quiz-question" id="quiz-question"></div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-result" id="quiz-result"></div>
      </div>
    </div>

    <!-- Midnight Roulette Scene -->
    <div id="scene-roulette" class="scene">
      <div class="secret-gallery-bg"></div>
      <div class="roulette-container">
        <h2 class="scene-title secret-title">MIDNIGHT ROULETTE</h2>
        <div class="roulette-venus">
          <img src="assets/images/characters/venus/portrait.png" alt="VENUS">
        </div>
        <div class="roulette-msg" id="roulette-msg">「右か左か…どっちを選ぶ？」</div>
        <div class="roulette-streak" id="roulette-streak">0 / 10</div>
        <div class="roulette-choices">
          <button class="neon-btn roulette-btn" id="roulette-left">← LEFT</button>
          <button class="neon-btn roulette-btn" id="roulette-right">RIGHT →</button>
        </div>
        <button class="neon-btn-sm" id="roulette-back-btn" style="margin-top:12px;">Give up</button>
      </div>
    </div>

    <!-- VENUS Profile Modal -->
    <div id="venus-profile-modal" class="modal" style="display:none;">
      <div class="venus-profile-container">
        <img src="assets/images/characters/venus/portrait.png" alt="VENUS" class="venus-profile-img">
        <div class="venus-profile-info" id="venus-profile-info"></div>
        <div class="venus-secret-hint" id="venus-secret-hint"></div>
        <button class="neon-btn" id="venus-profile-close">Close</button>
      </div>
    </div>

    <!-- Secret Gallery -->
    <div id="scene-secret-gallery" class="scene">
      <div class="secret-gallery-bg"></div>
      <div class="secret-gallery-header">
        <h2 class="scene-title secret-title">VIP ROOM</h2>
        <button class="neon-btn back-btn" id="secret-gallery-back">Back</button>
      </div>
      <div class="secret-gallery-grid" id="secret-gallery-grid"></div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <h3 id="settings-title">Settings</h3>
        <div class="setting-row secret-row" id="secret-row" style="display:none;">
          <label>Secret</label>
          <input type="text" id="secret-code-input" class="name-input" placeholder="password" maxlength="20" autocomplete="off">
          <button class="neon-btn-sm" id="secret-submit">Enter</button>
        </div>
        <div class="secret-msg" id="secret-msg" style="display:none;"></div>
        <div class="setting-row">
          <label>名前変更</label>
          <input type="text" id="settings-name" class="name-input" maxlength="20">
          <button class="neon-btn-sm" id="settings-name-save">保存</button>
        </div>
        <div class="setting-row">
          <label>BGM</label>
          <input type="range" id="settings-bgm-vol" min="0" max="100" value="50">
        </div>
        <div class="setting-row">
          <label>SE</label>
          <input type="range" id="settings-se-vol" min="0" max="100" value="70">
        </div>
        <div class="setting-row danger">
          <button class="neon-btn-sm danger-btn" id="settings-reset">データリセット</button>
        </div>
        <button class="neon-btn" id="settings-close">閉じる</button>
      </div>
    </div>
  </div>

  <!-- Audio Elements -->
  <audio id="bgm-player" loop></audio>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nameEntry.js"></script>
  <script src="js/dialogue.js"></script>
  <script src="js/lobby.js"></script>
  <script src="js/jigsaw.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/runner.js"></script>
  <script src="js/secret.js"></script>
  <script>
    // Unregister old SWs and clear caches to ensure fresh files
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
    if (typeof caches !== 'undefined') {
      caches.keys().then(names => names.forEach(n => caches.delete(n)));
    }
  </script>
</body>
</html>
